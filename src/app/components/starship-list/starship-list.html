<div class="p-6 bg-gray-50 min-h-screen">
  <div class="max-w-[98%] mx-auto">
    <div class="mb-6 flex justify-between items-end px-2">
      <div>
        <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Spacecraft Registry</h1>
        <p class="text-sm text-gray-500 mt-1">Galactic Empire Fleet Database</p>
      </div>
      <div
        class="hidden md:flex items-center gap-2 text-xs text-blue-600 bg-blue-50 px-3 py-2 rounded-lg border border-blue-100"
      >
        <span class="relative flex h-2 w-2">
          <span
            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"
          ></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
        </span>
        <span>Drag column edges to resize freely</span>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-xl border border-gray-200 overflow-hidden">
      <ag-grid-angular
        style="width: 100%; height: 1050px"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [rowModelType]="rowModelType"
        [cacheBlockSize]="cacheBlockSize"
        (gridReady)="onGridReady($event)"
        class="ag-theme-quartz custom-clean-grid"
      >
      </ag-grid-angular>
    </div>
  </div>
</div>
