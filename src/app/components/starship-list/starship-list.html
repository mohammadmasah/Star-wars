<div class="p-6 bg-gray-50 min-h-screen">
  <div class="max-w-[98%] mx-auto">
    <div class="mb-6 flex justify-between items-end px-2">
      <div>
        <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Spacecraft Registry</h1>
        <p class="text-sm text-gray-500 mt-1">Galactic Empire Fleet Database</p>
      </div>

      <div class="flex items-center gap-4">
        <button
          (click)="openResetModal()"
          class="flex items-center gap-2 px-4 py-2 bg-white text-red-600 border border-red-200 rounded-lg hover:bg-red-50 hover:text-red-700 transition-all shadow-sm text-sm font-medium"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
          </svg>
          Reset Data
        </button>

        <div
          class="hidden md:flex items-center gap-2 text-xs text-blue-600 bg-blue-50 px-3 py-2 rounded-lg border border-blue-100"
        >
          <span class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"
            ></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
          </span>
          <span>Drag column edges to resize freely</span>
        </div>
      </div>
    </div>

    <div class="mb-4 px-2">
      <div class="relative max-w-md">
        <input
          type="text"
          (input)="onSearch($event)"
          placeholder="Search starships by name..."
          class="block w-full pl-4 pr-3 py-2 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all"
        />
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-xl border border-gray-200 overflow-hidden">
      <ag-grid-angular
        style="width: 100%; height: 1050px"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [rowModelType]="rowModelType"
        [cacheBlockSize]="cacheBlockSize"
        (gridReady)="onGridReady($event)"
        (cellValueChanged)="onCellValueChanged($event)"
        class="ag-theme-quartz custom-clean-grid"
      >
      </ag-grid-angular>
    </div>
  </div>

  <div
    *ngIf="showResetModal"
    class="fixed inset-0 z-9999 flex items-center justify-center overflow-y-auto"
  >
    <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity"></div>

    <div
      class="relative bg-white rounded-2xl shadow-2xl max-w-lg w-full m-4 overflow-hidden transform transition-all border border-gray-100"
    >
      <div class="p-8 text-center">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-red-50 mb-6">
          <svg
            class="h-10 w-10 text-red-600"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.34c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
            />
          </svg>
        </div>

        <h3 class="text-xl font-bold text-gray-900 mb-2">Reset All Changes?</h3>
        <p class="text-gray-500 mb-8">
          This action will permanently delete all your manual edits in the registry. The database
          will revert to the original Imperial fleet data.
        </p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
          <button
            (click)="confirmReset()"
            class="inline-flex justify-center items-center px-6 py-3 rounded-xl bg-red-600 text-white font-semibold hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition-all shadow-lg shadow-red-200"
          >
            Yes, Reset Registry
          </button>
          <button
            (click)="closeModal()"
            class="inline-flex justify-center items-center px-6 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 focus:outline-none transition-all"
          >
            No, Keep Data
          </button>
        </div>
      </div>
    </div>
  </div>
  <div
    *ngIf="errorMessage"
    class="fixed bottom-10 left-1/2 -translate-x-1/2 z-100 w-full max-w-md px-4"
  >
    <div
      class="bg-red-600 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between animate-bounce"
    >
      <div class="flex items-center gap-3">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
        <span class="font-medium">{{ errorMessage }}</span>
      </div>
      <button
        (click)="retryLoad()"
        class="bg-white text-red-600 px-4 py-1.5 rounded-xl font-bold text-sm hover:bg-gray-100 transition-colors"
      >
        Retry
      </button>
    </div>
  </div>
</div>
