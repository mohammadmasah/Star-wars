<div class="bg-gray-50 h-screen flex flex-col overflow-hidden p-4">
  <header class="max-w-[98%] mx-auto mb-6">
    <div
      class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 flex flex-col md:flex-row justify-between items-center gap-4"
    >
      <div class="flex items-center gap-4">
        <div class="bg-gray-900 p-2 rounded-xl text-yellow-400 shadow-lg">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" />
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-black text-gray-900 tracking-tight uppercase">
            Star Wars <span class="text-blue-600">Directory</span>
          </h1>
          <p class="text-[10px] text-gray-400 font-bold tracking-[0.2em] uppercase">
            Imperial Fleet Registry
          </p>
        </div>
      </div>

      <div class="flex items-center gap-3 w-full md:w-auto">
        <div class="relative grow md:w-64">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
          </span>
          <input
            type="text"
            (input)="onSearch($event)"
            placeholder="Search starships by name..."
            class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none"
          />
        </div>

        <button
          (click)="openResetModal()"
          class="flex items-center gap-2 px-4 py-2 bg-white text-red-600 border border-red-100 rounded-xl hover:bg-red-50 transition-all shadow-sm text-xs font-bold whitespace-nowrap"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
          </svg>
          RESET DATA
        </button>
      </div>
    </div>
  </header>
  <div class="flex-1 overflow-hidden mx-auto w-[98%]">
    <div class="bg-white rounded-xl shadow-xl border border-gray-200 h-full">
      <ag-grid-angular
        style="width: 100%; height: 100%"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [rowModelType]="rowModelType"
        [cacheBlockSize]="cacheBlockSize"
        (gridReady)="onGridReady($event)"
        (cellValueChanged)="onCellValueChanged($event)"
        class="ag-theme-quartz custom-clean-grid"
      >
      </ag-grid-angular>
    </div>
  </div>
  <div *ngIf="isEndOfList" class="flex flex-col items-center justify-center animate-fade-in-up">
    <div class="h-px w-3 bg-linear-to-r from-transparent via-gray-300 to-transparent mb-5"></div>
    <div
      class="bg-gray-900 text-white px-6 py-2 rounded-2xl flex items-center gap-4 border border-gray-700"
    >
      <div class="w-10 h-10 bg-green-500/20 rounded-full flex items-center justify-center">
        <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="3"
            d="M5 13l4 4L19 7"
          ></path>
        </svg>
      </div>
      <div class="flex flex-col text-left">
        <p class="text-[10px] font-black uppercase tracking-widest text-gray-500">END OF LIST</p>
        <p class="text-sm font-bold text-white">Showing all {{ totalRows }} starships.</p>
      </div>
    </div>
  </div>
  <div
    *ngIf="showResetModal"
    class="fixed inset-0 z-9999 flex items-center justify-center overflow-y-auto"
  >
    <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity"></div>

    <div
      class="relative bg-white rounded-2xl shadow-2xl max-w-lg w-full m-4 overflow-hidden transform transition-all border border-gray-100"
    >
      <div class="p-8 text-center">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-red-50 mb-6">
          <svg
            class="h-10 w-10 text-red-600"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.34c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
            />
          </svg>
        </div>

        <h3 class="text-xl font-bold text-gray-900 mb-2">Reset All Changes?</h3>
        <p class="text-gray-500 mb-8">
          This action will permanently delete all your manual edits in the registry. The database
          will revert to the original Imperial fleet data.
        </p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
          <button
            (click)="confirmReset()"
            class="inline-flex justify-center items-center px-6 py-3 rounded-xl bg-red-600 text-white font-semibold hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition-all shadow-lg shadow-red-200"
          >
            Yes, Reset Registry
          </button>
          <button
            (click)="closeModal()"
            class="inline-flex justify-center items-center px-6 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 focus:outline-none transition-all"
          >
            No, Keep Data
          </button>
        </div>
      </div>
    </div>
  </div>
  <div
    *ngIf="errorMessage"
    class="fixed bottom-10 left-1/2 -translate-x-1/2 z-100 w-full max-w-md px-4"
  >
    <div
      class="bg-red-600 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between animate-bounce"
    >
      <div class="flex items-center gap-3">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
        <span class="font-medium">{{ errorMessage }}</span>
      </div>
      <button
        (click)="retryLoad()"
        class="bg-white text-red-600 px-4 py-1.5 rounded-xl font-bold text-sm hover:bg-gray-100 transition-colors"
      >
        Retry
      </button>
    </div>
  </div>
</div>
